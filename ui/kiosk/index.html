<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>補課系統 — 義工櫃台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../theme.css">
  <style>
    .kiosk-section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .kiosk-section-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--header);
      margin-bottom: 10px;
    }
    .kiosk-regtabs {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
    }
    .kiosk-regtab {
      flex: 1;
      background: var(--header-tint);
      border: 1.5px solid var(--header-tint-line);
      border-radius: var(--r-md) var(--r-md) 0 0;
      padding: 14px 10px;
      font-size: 16px;
      font-weight: 500;
      color: var(--header);
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      line-height: 1.3;
    }
    .kiosk-regtab.active {
      background: var(--header);
      color: var(--header-tx);
      border-color: var(--header);
    }
    .kiosk-regpanel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-top: none;
      border-radius: 0 0 var(--r-md) var(--r-md);
      padding: 16px;
      margin-bottom: 14px;
    }
    .kiosk-listcard {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .kiosk-listcard-title {
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 500;
      color: var(--header);
      background: var(--header-tint);
    }
    .kiosk-listrow {
      padding: 10px 16px;
      font-size: 14px;
      border-top: 1px solid var(--line);
    }
    .kiosk-listrow:first-child { border-top: none; }
    .kiosk-listrow:nth-child(even) { background: var(--surface-alt); }
    .kiosk-listempty {
      padding: 14px 16px;
      font-size: 14px;
      color: var(--muted);
    }
    .kiosk-collapse-toggle {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .kiosk-collapse-arrow {
      display: inline-block;
      font-size: 12px;
      transition: transform .15s;
    }
    .kiosk-collapse-toggle.collapsed .kiosk-collapse-arrow {
      transform: rotate(-90deg);
    }
    #login-section {
      max-width: 360px;
      margin: 60px auto;
      padding: 0 16px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 24px 20px;
    }
    .login-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--header);
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ── 登入區（未登入時顯示） ───────────────────────────────────── -->
<div id="login-section">
  <div class="login-card">
    <div class="login-title">義工櫃台登入</div>
    <form id="login-form" style="display:flex;flex-direction:column;gap:12px">
      <div>
        <div style="font-size:14px;margin-bottom:4px">帳號</div>
        <input type="text" name="username" class="buke-input" style="width:100%" autocomplete="username" required>
      </div>
      <div>
        <div style="font-size:14px;margin-bottom:4px">密碼</div>
        <input type="password" name="password" class="buke-input" style="width:100%" autocomplete="current-password" required>
      </div>
      <div id="login-err" style="font-size:13px;color:var(--danger-tx);min-height:18px"></div>
      <button type="submit" class="buke-btn" style="width:100%;padding:10px">登入</button>
    </form>
  </div>
</div>

<!-- ── 已登入：主畫面 ───────────────────────────────────────────── -->
<div id="dashboard-section" style="display:none">

  <header class="buke-header">
    <div class="title">義工櫃台</div>
    <button id="btn-logout" class="logout-btn"
            style="font-size:14px;cursor:pointer;background:none;border:1px solid var(--header-tx);
                   border-radius:var(--r-pill);padding:4px 12px;color:var(--header-tx)">登出</button>
  </header>

  <div style="background:var(--surface);border-bottom:1px solid var(--line);
              padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:15px;color:var(--muted)">義工：<strong id="staff-name"></strong></span>
    <label style="font-size:14px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-left:auto">
      日期：<input type="date" id="date-picker" class="buke-input" style="width:160px">
    </label>
  </div>

  <div class="buke-wrap">

    <!-- 現場登記／預約：分頁式，同時只會開一個，選中的整塊變深棗紅色（移到最上面，最常用） -->
    <div class="kiosk-regtabs">
      <button class="kiosk-regtab" data-tab-panel="panel-mk-register">現場登記補課 / 其他日預約</button>
      <button class="kiosk-regtab" data-tab-panel="panel-training-register">現場登記培訓補課</button>
      <button class="kiosk-regtab" data-tab-panel="panel-tr-register">現場登記日↔夜間調班補課</button>
    </div>

    <div id="panel-mk-register" class="kiosk-regpanel" style="display:none">
      <div style="font-size:15px;margin-bottom:8px">輸入學員 9 碼編號，或直接輸入姓名查詢</div>
      <form id="mk-lookup-form" style="display:flex;gap:8px;align-items:center">
        <input type="text" name="member_code" id="mk-lookup-input" class="buke-input" style="flex:1" placeholder="例：000012345 或 王小明"
               maxlength="30">
        <button type="submit" class="buke-btn" style="flex-shrink:0;padding:8px 14px">查詢</button>
      </form>
      <div id="mk-lookup-suggest" style="margin-top:6px"></div>
      <div id="mk-lookup-msg" style="font-size:13px;margin-top:6px;min-height:18px"></div>
      <div id="mk-lookup-result"></div>
    </div>

    <div id="panel-training-register" class="kiosk-regpanel" style="display:none">
      <div style="font-size:15px;margin-bottom:8px">輸入學員 9 碼編號，或直接輸入姓名查詢</div>
      <form id="training-lookup-form" style="display:flex;gap:8px;align-items:center">
        <input type="text" name="member_code" id="training-lookup-input" class="buke-input" style="flex:1"
               placeholder="例：000012345 或 王小明" maxlength="30">
        <button type="submit" class="buke-btn" style="flex-shrink:0;padding:8px 14px">查詢</button>
      </form>
      <div id="training-lookup-suggest" style="margin-top:6px"></div>
      <div id="training-lookup-msg" style="font-size:13px;margin-top:6px;min-height:18px"></div>
      <div id="training-lookup-result"></div>
    </div>

    <div id="panel-tr-register" class="kiosk-regpanel" style="display:none">
      <div style="font-size:15px;margin-bottom:8px">輸入學員 9 碼編號，或直接輸入姓名查詢</div>
      <form id="tr-lookup-form" style="display:flex;gap:8px;align-items:center">
        <input type="text" name="member_code" id="tr-lookup-input" class="buke-input" style="flex:1" placeholder="例：000012345 或 王小明"
               maxlength="30">
        <button type="submit" class="buke-btn" style="flex-shrink:0;padding:8px 14px">查詢</button>
      </form>
      <div id="tr-lookup-suggest" style="margin-top:6px"></div>
      <div id="tr-lookup-msg" style="font-size:13px;margin-top:6px;min-height:18px"></div>
      <div id="tr-lookup-result"></div>
    </div>

    <!-- 到場提醒（站內警示） -->
    <div id="kiosk-attendance-alerts"></div>

    <!-- 今日調班 -->
    <div class="kiosk-section">
      <div class="kiosk-section-title kiosk-collapse-toggle" data-collapse-target="kiosk-transfers">
        <span class="kiosk-collapse-arrow">▾</span> 今日日↔夜間調班補課
      </div>
      <div id="kiosk-transfers"></div>
    </div>

    <!-- 今日補課 -->
    <div class="kiosk-section">
      <div class="kiosk-section-title kiosk-collapse-toggle" data-collapse-target="kiosk-makeups">
        <span class="kiosk-collapse-arrow">▾</span> 今日補課
      </div>
      <div id="kiosk-makeups"></div>
    </div>

    <!-- 今日到場記錄 -->
    <div class="kiosk-listcard">
      <div class="kiosk-listcard-title">📋 今日到場記錄</div>
      <div id="kiosk-today-log">
        <p class="kiosk-listempty">今日尚無補課到場記錄。</p>
      </div>
    </div>

    <!-- 今日登記清單 -->
    <div class="kiosk-listcard">
      <div class="kiosk-listcard-title kiosk-collapse-toggle" data-collapse-target="kiosk-today-registrations">
        <span class="kiosk-collapse-arrow">▾</span> 📝 今日登記清單
      </div>
      <div id="kiosk-today-registrations">
        <p class="kiosk-listempty">今日尚無新登記。</p>
      </div>
    </div>

    <!-- 今日培訓補課 -->
    <div class="kiosk-section">
      <div class="kiosk-section-title">今日培訓補課</div>
      <div id="kiosk-training-makeups"></div>
    </div>

  </div><!-- /.buke-wrap -->
</div><!-- /#dashboard-section -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../config/config.js" onerror="document.getElementById('login-err').textContent='設定檔載入失敗'"></script>
<script src="kiosk_render.js"></script>
<script src="kiosk_render_training.js"></script>
<script src="kiosk_name_search.js"></script>
<script src="kiosk_alerts.js"></script>
<script src="kiosk.js"></script>
</body>
</html>
